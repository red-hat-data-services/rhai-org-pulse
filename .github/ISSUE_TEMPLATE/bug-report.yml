name: Bug Report
description: Report a bug, data issue, or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! If possible, attach a diagnostics bundle from **About > Help & Debug > Download Diagnostics**.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: Describe what went wrong
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Dashboard / metrics
        - Roster / team data
        - GitHub / GitLab contributions
        - Trends / charts
        - Sprint tracking
        - Settings / admin
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste or attach the must-gather JSON if available
      render: json
