name: Kind Smoke Tests

on:
  pull_request:
    branches: [migration]
  push:
    branches: [migration]

jobs:
  smoke-test:
    name: Deploy to Kind & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: team-tracker

      - name: Build container images
        run: |
          docker build -f deploy/backend.Dockerfile -t localhost/team-tracker-backend:local .
          docker build -f deploy/frontend.Dockerfile -t localhost/team-tracker-frontend:local .

      - name: Load images into Kind
        run: |
          kind load docker-image localhost/team-tracker-backend:local --name team-tracker
          kind load docker-image localhost/team-tracker-frontend:local --name team-tracker

      - name: Create namespace and secrets
        run: |
          kubectl apply -f deploy/openshift/overlays/local/namespace.yaml

          # Dummy secrets — backend runs in DEMO_MODE so these aren't used
          kubectl create secret generic team-tracker-secrets \
            -n team-tracker \
            --from-literal=JIRA_EMAIL=ci-test@example.com \
            --from-literal=JIRA_TOKEN=dummy-token-for-ci \
            --from-literal=GITHUB_TOKEN=dummy-token

          # Backend mounts this as a volume for Google Sheets API (not needed in DEMO_MODE)
          kubectl create secret generic google-sa-key \
            -n team-tracker \
            --from-literal=service-account.json='{}'

      - name: Deploy application
        run: |
          kubectl apply -k deploy/openshift/overlays/ci/

      - name: Wait for deployments
        run: |
          echo "Waiting for backend deployment..."
          kubectl rollout status deployment/backend -n team-tracker --timeout=120s

          echo "Waiting for frontend deployment..."
          kubectl rollout status deployment/frontend -n team-tracker --timeout=120s

          echo "All deployments ready!"
          kubectl get pods -n team-tracker

      - name: Run smoke tests
        run: |
          # Port-forward backend (3001) and frontend (8080) in background
          kubectl port-forward -n team-tracker svc/backend 3001:3001 &
          kubectl port-forward -n team-tracker svc/team-tracker 8080:8080 &

          # Wait for port-forwards to establish
          sleep 5

          # Run the full smoke test suite
          BACKEND_URL=http://localhost:3001 FRONTEND_URL=http://localhost:8080 \
            ./tests/smoke/run.sh

      - name: Debug info (on failure)
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n team-tracker -o wide

          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n team-tracker

          echo ""
          echo "=== Backend Logs ==="
          kubectl logs -n team-tracker deployment/backend --tail=100 || true

          echo ""
          echo "=== Frontend Logs ==="
          kubectl logs -n team-tracker deployment/frontend --tail=100 || true

          echo ""
          echo "=== Events ==="
          kubectl get events -n team-tracker --sort-by='.lastTimestamp'

          echo ""
          echo "=== Services ==="
          kubectl get svc -n team-tracker

          echo ""
          echo "=== Deployments ==="
          kubectl describe deployments -n team-tracker
