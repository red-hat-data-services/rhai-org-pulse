name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check for deploy changes
        id: deploy-changes
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha || 'HEAD~1' }} HEAD | grep -q '^deploy/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kustomize
        if: steps.deploy-changes.outputs.changed == 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize overlays
        if: steps.deploy-changes.outputs.changed == 'true'
        run: |
          for overlay in deploy/openshift/overlays/*/; do
            name=$(basename "$overlay")
            echo "=== Validating overlay: $name ==="
            kustomize build "$overlay" > /dev/null
          done
