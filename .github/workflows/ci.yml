name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD)
          if echo "$CHANGED" | grep -qE '^(src/|server/|modules/|shared/|scripts/validate|package|vite\.config|tailwind\.config|postcss\.config|vitest\.config|index\.html|public/)'; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q '^deploy/'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.changes.outputs.app == 'true'
        run: npm ci

      - name: Validate module manifests
        if: steps.changes.outputs.app == 'true'
        run: npm run validate:modules

      - name: Run linting
        if: steps.changes.outputs.app == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.changes.outputs.app == 'true'
        run: npm test

      - name: Validate OpenAPI spec
        if: steps.changes.outputs.app == 'true'
        run: npm run validate:openapi

      - name: Build
        if: steps.changes.outputs.app == 'true'
        run: npm run build

      - name: Install kustomize
        if: steps.changes.outputs.deploy == 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize overlays
        if: steps.changes.outputs.deploy == 'true'
        run: |
          for overlay in deploy/openshift/overlays/*/; do
            name=$(basename "$overlay")
            echo "=== Validating overlay: $name ==="
            kustomize build "$overlay" > /dev/null
          done
