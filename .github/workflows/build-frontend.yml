name: Build & Push Frontend Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.mjs'
      - 'tailwind.config.mjs'
      - 'postcss.config.mjs'
      - 'deploy/frontend.Dockerfile'
      - 'deploy/nginx.conf'
      - 'package*.json'

concurrency:
  group: build-frontend
  cancel-in-progress: true

env:
  IMAGE: quay.io/org-pulse/team-tracker-frontend

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build-and-push:
    name: Build, Smoke Test & Push Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f deploy/frontend.Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .

      - name: Smoke test
        run: |
          # Create a network and a dummy backend so nginx can resolve
          # the "backend" upstream at startup (it crashes without it)
          docker network create smoke-net
          docker run -d --network smoke-net --name backend \
            --expose 3001 nginx:alpine \
            sh -c "echo 'ok' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"
          docker run -d --network smoke-net --name frontend-smoke \
            -p 8080:8080 ${{ env.IMAGE }}:${{ github.sha }}
          echo "Waiting for nginx to be ready..."
          for i in $(seq 1 10); do
            if curl -sf --max-time 2 http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "✅ Smoke test passed — nginx responded on /healthz (attempt $i)"
              docker stop frontend-smoke backend
              docker network rm smoke-net
              exit 0
            fi
            echo "  Attempt $i/10 — not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "❌ Smoke test failed — nginx never responded"
          docker logs frontend-smoke
          docker stop frontend-smoke backend
          docker network rm smoke-net
          exit 1

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  update-prod-image:
    name: Update Prod Image Tag
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: update-prod-image
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in prod overlay
        working-directory: deploy/openshift/overlays/prod
        run: |
          kustomize edit set image ${{ env.IMAGE }}:${{ github.sha }}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/prod > /dev/null

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="deploy/frontend-image-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add deploy/openshift/overlays/prod/kustomization.yaml
          git commit -m "deploy: update frontend image to ${{ github.sha }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "deploy: update frontend image to ${GITHUB_SHA::7}" \
            --body "Automated image tag update for \`team-tracker-frontend\` to \`${{ github.sha }}\`." \
            --label automated
          gh pr merge "$BRANCH" --auto --squash
