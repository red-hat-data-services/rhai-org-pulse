name: Build & Push Backend Image

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/backend.Dockerfile'
      - 'package*.json'

concurrency:
  group: build-backend
  cancel-in-progress: true

env:
  IMAGE: quay.io/org-pulse/team-tracker-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-and-push:
    name: Build, Smoke Test & Push Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f deploy/backend.Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .

      - name: Smoke test
        run: |
          docker run -d --name backend-smoke -p 3001:3001 ${{ env.IMAGE }}:${{ github.sha }}
          echo "Waiting for backend to start..."
          sleep 5
          if curl -sf --max-time 5 http://localhost:3001 > /dev/null 2>&1; then
            echo "✅ Smoke test passed — backend responded on port 3001"
          else
            echo "⚠️  Backend didn't respond to HTTP, checking if process is running..."
            if docker exec backend-smoke sh -c 'kill -0 1 2>/dev/null'; then
              echo "✅ Smoke test passed — backend process is alive and listening"
            else
              echo "❌ Smoke test failed — backend process crashed"
              docker logs backend-smoke
              docker stop backend-smoke
              exit 1
            fi
          fi
          docker logs backend-smoke
          docker stop backend-smoke

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
