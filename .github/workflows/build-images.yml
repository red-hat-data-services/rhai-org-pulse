name: Build & Push Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # Backend
      - 'server/**'
      - 'modules/*/server/**'
      - 'shared/server/**'
      - 'deploy/backend.Dockerfile'
      # Frontend
      - 'src/**'
      - 'public/**'
      - 'modules/*/client/**'
      - 'shared/client/**'
      - 'index.html'
      - 'vite.config.mjs'
      - 'tailwind.config.mjs'
      - 'postcss.config.mjs'
      - 'deploy/frontend.Dockerfile'
      - 'deploy/nginx.conf'
      # Shared
      - 'modules/*/module.json'
      - 'package*.json'

concurrency:
  group: build-images
  cancel-in-progress: true

env:
  BACKEND_IMAGE: quay.io/org-pulse/team-tracker-backend
  FRONTEND_IMAGE: quay.io/org-pulse/team-tracker-frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BACKEND=false
          FRONTEND=false

          # Check backend paths
          if echo "$CHANGED" | grep -qE '^(server/|modules/[^/]+/server/|modules/[^/]+/module\.json|shared/server/|deploy/backend\.Dockerfile|package)'; then
            BACKEND=true
          fi

          # Check frontend paths
          if echo "$CHANGED" | grep -qE '^(src/|public/|modules/[^/]+/client/|modules/[^/]+/module\.json|shared/client/|index\.html|vite\.config|tailwind\.config|postcss\.config|deploy/frontend\.Dockerfile|deploy/nginx\.conf|package)'; then
            FRONTEND=true
          fi

          # workflow_dispatch builds both
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BACKEND=true
            FRONTEND=true
          fi

          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "Backend: $BACKEND, Frontend: $FRONTEND"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build-backend:
    name: Build & Push Backend
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f deploy/backend.Dockerfile \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            .

      - name: Smoke test
        run: |
          docker run -d --name backend-smoke -p 3001:3001 ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          echo "Waiting for backend to start..."
          sleep 5
          if curl -sf --max-time 5 http://localhost:3001 > /dev/null 2>&1; then
            echo "✅ Smoke test passed — backend responded on port 3001"
          else
            echo "⚠️  Backend didn't respond to HTTP, checking if process is running..."
            if docker exec backend-smoke sh -c 'kill -0 1 2>/dev/null'; then
              echo "✅ Smoke test passed — backend process is alive and listening"
            else
              echo "❌ Smoke test failed — backend process crashed"
              docker logs backend-smoke
              docker stop backend-smoke
              exit 1
            fi
          fi
          docker logs backend-smoke
          docker stop backend-smoke

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

  build-frontend:
    name: Build & Push Frontend
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f deploy/frontend.Dockerfile \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            .

      - name: Smoke test
        run: |
          # Start a dummy backend on the host so nginx can resolve the
          # "backend" upstream at startup (it crashes without it)
          python3 -m http.server 3001 &
          BACKEND_PID=$!
          docker run -d --network host --add-host=backend:127.0.0.1 \
            --name frontend-smoke \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          echo "Waiting for nginx to be ready..."
          for i in $(seq 1 10); do
            if curl -sf --max-time 2 http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "✅ Smoke test passed — nginx responded on /healthz (attempt $i)"
              docker stop frontend-smoke
              kill $BACKEND_PID 2>/dev/null
              exit 0
            fi
            echo "  Attempt $i/10 — not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "❌ Smoke test failed — nginx never responded"
          docker logs frontend-smoke
          docker stop frontend-smoke
          kill $BACKEND_PID 2>/dev/null
          exit 1

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: |
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  update-prod-image:
    name: Update Prod Image Tags
    needs: [detect-changes, build-backend, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        working-directory: deploy/openshift/overlays/prod
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        working-directory: deploy/openshift/overlays/prod
        run: |
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Validate kustomize build
        run: kustomize build deploy/openshift/overlays/prod > /dev/null

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Build commit message and PR title based on what changed
          PARTS=""
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            PARTS="backend"
          fi
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}frontend"
          fi

          BRANCH="deploy/image-update-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add deploy/openshift/overlays/prod/kustomization.yaml
          git commit -m "deploy: update ${PARTS} image to ${{ github.sha }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "deploy: update ${PARTS} image to ${GITHUB_SHA::7}" \
            --body "Automated image tag update for ${PARTS} to \`${{ github.sha }}\`." \
            --label automated
          gh pr merge "$BRANCH" --auto --squash
