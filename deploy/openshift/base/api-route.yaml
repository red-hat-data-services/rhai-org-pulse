apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: team-tracker-api
  annotations:
    haproxy.router.openshift.io/timeout: 120s
  labels:
    app: team-tracker
    component: backend
spec:
  to:
    kind: Service
    name: backend
  port:
    targetPort: 3001
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
