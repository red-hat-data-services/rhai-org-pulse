apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: rhai-org-pulse-frontend
labels:
  app: team-tracker
  component: frontend
parameters:
  - name: FRONTEND_IMAGE
    value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/rhai-org-pulse-frontend
  - name: FRONTEND_IMAGE_TAG
    required: true
    value: latest
  - name: OAUTH_PROXY_IMAGE
    value: quay.io/openshift/origin-oauth-proxy:4.16
  - name: FRONTEND_REPLICAS
    value: "1"
  - name: ROUTE_HOST
    value: ""
  - name: ROUTE_SHARD_LABEL
    value: ""
  - name: ROUTE_APPCODE_LABEL
    value: HPOP-0001
  - name: NGINX_MEMORY_REQUEST
    value: 32Mi
  - name: NGINX_MEMORY_LIMIT
    value: 64Mi
  - name: NGINX_CPU_REQUEST
    value: 25m
  - name: NGINX_CPU_LIMIT
    value: 50m
  - name: OAUTH_PROXY_MEMORY_REQUEST
    value: 64Mi
  - name: OAUTH_PROXY_MEMORY_LIMIT
    value: 128Mi
  - name: OAUTH_PROXY_CPU_REQUEST
    value: 100m
  - name: OAUTH_PROXY_CPU_LIMIT
    value: 200m
  - name: INIT_CONTAINER_IMAGE
    value: registry.access.redhat.com/ubi9/ubi-minimal:latest
objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: nginx-config-template
    data:
      app.conf.template: |
        server {
            listen       8080;
            server_name  localhost;

            root /usr/share/nginx/html;
            index index.html;

            # SPA fallback — serve index.html for all non-file routes
            location / {
                try_files $uri $uri/ /index.html;
            }

            # Proxy module content requests to backend (^~ beats regex locations)
            location ^~ /modules/ {
                proxy_pass http://backend:3001;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
                proxy_set_header X-Forwarded-User $http_x_forwarded_user;
                proxy_set_header X-Proxy-Secret "${PROXY_AUTH_SECRET}";
                proxy_read_timeout 120s;
            }

            # Proxy API requests to backend service
            location ^~ /api/ {
                proxy_pass http://backend:3001;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                # Pass through OAuth proxy headers
                proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
                proxy_set_header X-Forwarded-User $http_x_forwarded_user;
                proxy_set_header X-Proxy-Secret "${PROXY_AUTH_SECRET}";
                proxy_read_timeout 120s;
            }

            # Health check endpoint
            location /healthz {
                access_log off;
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: frontend-proxy
      annotations:
        serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"team-tracker"}}'

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      replicas: ${{FRONTEND_REPLICAS}}
      selector:
        matchLabels:
          app: team-tracker
          component: frontend
      template:
        metadata:
          labels:
            app: team-tracker
            component: frontend
        spec:
          serviceAccountName: frontend-proxy
          initContainers:
            - name: render-config
              image: ${INIT_CONTAINER_IMAGE}
              command: ["sh", "-c"]
              args:
                - |
                  sed "s|\${PROXY_AUTH_SECRET}|${PROXY_AUTH_SECRET}|g" \
                    /template/app.conf.template > /rendered/default.conf
              env:
                - name: PROXY_AUTH_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: proxy-auth-secret
                      key: secret
                      optional: true
              volumeMounts:
                - name: config-template
                  mountPath: /template
                  readOnly: true
                - name: rendered-config
                  mountPath: /rendered
              resources:
                requests:
                  memory: "16Mi"
                  cpu: "10m"
                limits:
                  memory: "32Mi"
                  cpu: "50m"
          containers:
            - name: oauth-proxy
              image: ${OAUTH_PROXY_IMAGE}
              ports:
                - containerPort: 4180
                  name: proxy
                  protocol: TCP
              args:
                - --https-address=:4180
                - --http-address=
                - --provider=openshift
                - --openshift-service-account=frontend-proxy
                - --upstream=http://localhost:8080
                - --tls-cert=/etc/tls/private/tls.crt
                - --tls-key=/etc/tls/private/tls.key
                - --cookie-secret-file=/etc/proxy/cookie-secret/session_secret
                - --pass-user-headers=true
                - --email-domain=*
                - --skip-auth-regex=^/api/docs
              volumeMounts:
                - name: proxy-tls
                  mountPath: /etc/tls/private
                  readOnly: true
                - name: cookie-secret
                  mountPath: /etc/proxy/cookie-secret
                  readOnly: true
              resources:
                requests:
                  memory: ${OAUTH_PROXY_MEMORY_REQUEST}
                  cpu: ${OAUTH_PROXY_CPU_REQUEST}
                limits:
                  memory: ${OAUTH_PROXY_MEMORY_LIMIT}
                  cpu: ${OAUTH_PROXY_CPU_LIMIT}
            - name: nginx
              image: ${FRONTEND_IMAGE}:${FRONTEND_IMAGE_TAG}
              ports:
                - containerPort: 8080
                  protocol: TCP
              volumeMounts:
                - name: rendered-config
                  mountPath: /etc/nginx/conf.d
                  readOnly: true
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 3
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 30
              resources:
                requests:
                  memory: ${NGINX_MEMORY_REQUEST}
                  cpu: ${NGINX_CPU_REQUEST}
                limits:
                  memory: ${NGINX_MEMORY_LIMIT}
                  cpu: ${NGINX_CPU_LIMIT}
          volumes:
            - name: proxy-tls
              secret:
                secretName: frontend-proxy-tls
            - name: cookie-secret
              secret:
                secretName: frontend-proxy-cookie
            - name: config-template
              configMap:
                name: nginx-config-template
            - name: rendered-config
              emptyDir: {}

  - apiVersion: v1
    kind: Service
    metadata:
      name: team-tracker
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: frontend-proxy-tls
    spec:
      selector:
        app: team-tracker
        component: frontend
      ports:
        - port: 4180
          targetPort: 4180
          name: proxy
          protocol: TCP

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: team-tracker
      labels:
        shard: ${ROUTE_SHARD_LABEL}
        paas.redhat.com/appcode: ${ROUTE_APPCODE_LABEL}
    spec:
      host: ${ROUTE_HOST}
      to:
        kind: Service
        name: team-tracker
      port:
        targetPort: proxy
      tls:
        termination: reencrypt
