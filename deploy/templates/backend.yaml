apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: rhai-org-pulse-backend
labels:
  app: team-tracker
  component: backend
parameters:
  - name: BACKEND_IMAGE
    value: quay.io/redhat-services-prod/hcm-eng-prod-tenant/rhai-org-pulse-backend
  - name: BACKEND_IMAGE_TAG
    required: true
    value: latest
  - name: BACKEND_REPLICAS
    value: "1"
  - name: JIRA_HOST
    value: https://redhat.atlassian.net
  - name: ADMIN_EMAILS
    value: ""
  - name: API_PUBLIC_URL
    value: ""
  - name: AUTH_EMAIL_DOMAIN
    value: ""
  - name: API_ROUTE_HOST
    value: ""
  - name: ROUTE_SHARD_LABEL
    value: ""
  - name: ROUTE_APPCODE_LABEL
    value: HPOP-0001
  - name: PVC_STORAGE_SIZE
    value: 1Gi
  - name: BACKEND_MEMORY_REQUEST
    value: 256Mi
  - name: BACKEND_MEMORY_LIMIT
    value: 512Mi
  - name: BACKEND_CPU_REQUEST
    value: 250m
  - name: BACKEND_CPU_LIMIT
    value: 500m
  - name: CRONJOB_SCHEDULE
    value: "0 6 * * *"
  - name: CRONJOB_SUSPEND
    value: "false"
  - name: CRONJOB_ADMIN_EMAIL
    value: ""
  - name: CRONJOB_IMAGE
    value: registry.access.redhat.com/ubi9/ubi-minimal:latest
objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: team-tracker-config
    data:
      NODE_ENV: production
      API_PORT: "3001"
      JIRA_HOST: ${JIRA_HOST}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      AUTH_EMAIL_DOMAIN: ${AUTH_EMAIL_DOMAIN}

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: team-tracker-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: ${PVC_STORAGE_SIZE}

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend
    spec:
      replicas: ${{BACKEND_REPLICAS}}
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: team-tracker
          component: backend
      template:
        metadata:
          labels:
            app: team-tracker
            component: backend
        spec:
          containers:
            - name: backend
              image: ${BACKEND_IMAGE}:${BACKEND_IMAGE_TAG}
              ports:
                - containerPort: 3001
                  protocol: TCP
              envFrom:
                - configMapRef:
                    name: team-tracker-config
              env:
                - name: JIRA_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: JIRA_EMAIL
                - name: JIRA_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: JIRA_TOKEN
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: GITHUB_TOKEN
                      optional: true
                - name: GITLAB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: GITLAB_TOKEN
                      optional: true
                - name: PRODUCT_PAGES_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: PRODUCT_PAGES_CLIENT_ID
                      optional: true
                - name: PRODUCT_PAGES_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: PRODUCT_PAGES_CLIENT_SECRET
                      optional: true
                - name: FEATURE_TRAFFIC_GITLAB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: FEATURE_TRAFFIC_GITLAB_TOKEN
                      optional: true
                - name: GITLAB_CEE_REDHAT_DOCS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: GITLAB_CEE_REDHAT_DOCS_TOKEN
                      optional: true
                - name: PROXY_AUTH_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: proxy-auth-secret
                      key: secret
                      optional: true
                - name: IPA_BIND_DN
                  valueFrom:
                    secretKeyRef:
                      name: ipa-credentials
                      key: IPA_BIND_DN
                      optional: true
                - name: IPA_BIND_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ipa-credentials
                      key: IPA_BIND_PASSWORD
                      optional: true
                - name: SMARTSHEET_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: team-tracker-secrets
                      key: SMARTSHEET_API_TOKEN
                      optional: true
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_ACCESS_KEY_ID
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                      optional: true
                - name: AWS_BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: aws-backup-credentials
                      key: AWS_BACKUP_BUCKET
                      optional: true
              volumeMounts:
                - name: data
                  mountPath: /app/data
                - name: google-sa-key
                  mountPath: /etc/secrets
                  readOnly: true
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: 3001
                initialDelaySeconds: 5
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: 3001
                initialDelaySeconds: 10
                periodSeconds: 30
              resources:
                requests:
                  memory: ${BACKEND_MEMORY_REQUEST}
                  cpu: ${BACKEND_CPU_REQUEST}
                limits:
                  memory: ${BACKEND_MEMORY_LIMIT}
                  cpu: ${BACKEND_CPU_LIMIT}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: team-tracker-data
            - name: google-sa-key
              secret:
                secretName: google-sa-key

  - apiVersion: v1
    kind: Service
    metadata:
      name: backend
    spec:
      selector:
        app: team-tracker
        component: backend
      ports:
        - port: 3001
          targetPort: 3001
          protocol: TCP

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: team-tracker-api
      annotations:
        haproxy.router.openshift.io/timeout: 120s
      labels:
        shard: ${ROUTE_SHARD_LABEL}
        paas.redhat.com/appcode: ${ROUTE_APPCODE_LABEL}
    spec:
      host: ${API_ROUTE_HOST}
      to:
        kind: Service
        name: backend
      port:
        targetPort: 3001
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: team-tracker-sync-refresh
      labels:
        app: team-tracker
        component: sync-refresh
    spec:
      schedule: ${CRONJOB_SCHEDULE}
      suspend: ${{CRONJOB_SUSPEND}}
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          activeDeadlineSeconds: 1800
          backoffLimit: 1
          template:
            metadata:
              labels:
                app: team-tracker
                component: sync-refresh
            spec:
              restartPolicy: Never
              containers:
                - name: sync-refresh
                  image: ${CRONJOB_IMAGE}
                  env:
                    - name: PROXY_AUTH_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: proxy-auth-secret
                          key: secret
                          optional: true
                  command:
                    - /bin/sh
                    - -c
                    - |
                      set -e
                      BACKEND="http://backend:3001"
                      AUTH_HEADER="X-Forwarded-Email: ${CRONJOB_ADMIN_EMAIL}"
                      PROXY_SECRET_HEADER="X-Proxy-Secret: ${PROXY_AUTH_SECRET}"

                      # Step 0: Trigger module content sync
                      echo "=== Triggering module sync ==="
                      curl -sf -X POST "$BACKEND/api/admin/modules/sync" -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Module sync skipped (no modules configured)"

                      # Step 1: Trigger roster sync
                      echo "=== Triggering roster sync ==="
                      RESP=$(curl -sf -X POST "$BACKEND/api/admin/roster-sync/trigger" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" -H "Content-Type: application/json")
                      echo "Response: $RESP"

                      STATUS=$(echo "$RESP" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
                      if [ "$STATUS" != "started" ] && [ "$STATUS" != "already_running" ]; then
                        echo "ERROR: Unexpected roster sync response"
                        exit 1
                      fi

                      # Poll roster sync status until complete
                      echo "=== Waiting for roster sync to complete ==="
                      ATTEMPTS=0
                      MAX_ATTEMPTS=60
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 15
                        ATTEMPTS=$((ATTEMPTS + 1))
                        SYNC_STATUS=$(curl -sf "$BACKEND/api/admin/roster-sync/status" -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                        SYNCING=$(echo "$SYNC_STATUS" | grep -o '"syncing":true' || true)
                        if [ -z "$SYNCING" ]; then
                          echo "Roster sync complete after $ATTEMPTS checks"
                          SYNC_ERR=$(echo "$SYNC_STATUS" | grep -o '"lastSyncStatus":"[^"]*"' | cut -d'"' -f4)
                          echo "Last sync status: $SYNC_ERR"
                          break
                        fi
                        echo "Still syncing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "ERROR: Roster sync timed out"
                        exit 1
                      fi

                      # Step 2: Trigger full metrics refresh
                      echo "=== Triggering full metrics refresh ==="
                      RESP=$(curl -sf -X POST "$BACKEND/api/refresh" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" -H "Content-Type: application/json" \
                        -d '{"scope":"all","force":true}')
                      echo "Response: $RESP"

                      # Poll refresh status until complete
                      echo "=== Waiting for metrics refresh to complete ==="
                      ATTEMPTS=0
                      MAX_ATTEMPTS=120
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 15
                        ATTEMPTS=$((ATTEMPTS + 1))
                        REFRESH_STATUS=$(curl -sf "$BACKEND/api/refresh/status" -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                        RUNNING=$(echo "$REFRESH_STATUS" | grep -o '"running":true' || true)
                        if [ -z "$RUNNING" ]; then
                          echo "Metrics refresh complete after $ATTEMPTS checks"
                          break
                        fi
                        echo "Still refreshing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "ERROR: Metrics refresh timed out"
                        exit 1
                      fi

                      # Step 3: Trigger AI Impact refresh
                      echo "=== Triggering AI Impact refresh ==="
                      curl -sf -X POST "$BACKEND/api/modules/ai-impact/refresh" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "AI Impact refresh skipped"

                      # Poll until complete
                      ATTEMPTS=0
                      MAX_ATTEMPTS=20
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 10
                        ATTEMPTS=$((ATTEMPTS + 1))
                        STATUS=$(curl -sf "$BACKEND/api/modules/ai-impact/refresh/status" \
                          -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                        RUNNING=$(echo "$STATUS" | grep -oE '"running"\s*:\s*true' || true)
                        if [ -z "$RUNNING" ]; then
                          echo "AI Impact refresh complete after $ATTEMPTS checks"
                          break
                        fi
                        echo "Still refreshing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "WARNING: AI Impact refresh timed out (non-fatal, continuing)"
                      fi

                      # Step 4: Trigger Allocation refresh (all teams)
                      echo "=== Triggering Allocation refresh ==="
                      curl -sf -X POST "$BACKEND/api/modules/team-tracker/allocation/refresh" \
                        -H "Content-Type: application/json" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" \
                        -d '{}' || echo "Allocation refresh failed (non-fatal)"
                      sleep 5
                      ATTEMPTS=0
                      MAX_ATTEMPTS=60
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 10
                        ATTEMPTS=$((ATTEMPTS + 1))
                        STATUS=$(curl -sf "$BACKEND/api/modules/team-tracker/allocation/refresh/status" \
                          -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" 2>/dev/null)
                        echo "  Allocation refresh status: $STATUS"
                        RUNNING=$(echo "$STATUS" | grep -oE '"running"\s*:\s*true' || true)
                        if [ -z "$RUNNING" ]; then
                          echo "Allocation refresh complete after $ATTEMPTS checks"
                          break
                        fi
                        echo "Still refreshing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "WARNING: Allocation refresh timed out (non-fatal, continuing)"
                      fi

                      # Step 4b: Sync feature labels from Jira
                      echo "=== Triggering Feature Jira Sync ==="
                      curl -sf -X POST "$BACKEND/api/modules/ai-impact/features/sync" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Feature Jira sync skipped"

                      ATTEMPTS=0
                      MAX_ATTEMPTS=30
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 10
                        ATTEMPTS=$((ATTEMPTS + 1))
                        STATUS=$(curl -sf "$BACKEND/api/modules/ai-impact/features/sync/status" \
                          -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                        RUNNING=$(echo "$STATUS" | grep -oE '"running"\s*:\s*true' || true)
                        if [ -z "$RUNNING" ]; then
                          echo "Feature Jira sync complete after $ATTEMPTS checks"
                          break
                        fi
                        echo "Still syncing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "WARNING: Feature Jira sync timed out (non-fatal, continuing)"
                      fi

                      # Step 4c: Generate metric snapshots (refresh current month)
                      echo "=== Generating metric snapshots ==="
                      curl -sf -X POST "$BACKEND/api/modules/team-tracker/snapshots/generate" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" -H "Content-Type: application/json" \
                        -d '{"refreshCurrent":true}' || echo "WARNING: Snapshot generation failed (non-fatal)"

                      # Step 5: Sync Release Registry with Product Pages
                      echo "=== Syncing Release Registry with Product Pages ==="
                      curl -sf -X POST "$BACKEND/api/modules/releases/registry/discover" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Registry sync skipped (no PP config)"

                      # Step 6: Trigger Releases Execution refresh
                      echo "=== Triggering Releases Execution refresh ==="
                      curl -sf -X POST "$BACKEND/api/modules/releases/execution/refresh" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Releases Execution refresh skipped"

                      # Step 7: Trigger Feature Hygiene refresh for all stored versions
                      echo "=== Triggering Feature Hygiene refresh (all versions) ==="
                      curl -sf -X POST "$BACKEND/api/modules/releases/hygiene/refresh-all" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Hygiene refresh-all skipped (no data yet)"

                      ATTEMPTS=0
                      MAX_ATTEMPTS=60
                      while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                        sleep 10
                        ATTEMPTS=$((ATTEMPTS + 1))
                        STATUS=$(curl -sf "$BACKEND/api/modules/releases/hygiene/refresh/status" \
                          -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                        RUNNING=$(echo "$STATUS" | grep -oE '"running"\s*:\s*true' || true)
                        if [ -z "$RUNNING" ]; then
                          echo "Hygiene refresh complete after $ATTEMPTS checks"
                          break
                        fi
                        echo "Still refreshing hygiene... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                      done

                      if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                        echo "WARNING: Hygiene refresh timed out (non-fatal, continuing)"
                      fi

                      # Step 8: Trigger data backup to S3
                      echo "=== Triggering data backup ==="
                      BACKUP_RESP=$(curl -sf -X POST "$BACKEND/api/admin/backup" \
                        -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" -H "Content-Type: application/json" \
                        --max-time 120) || echo "WARNING: Backup failed (non-fatal)"
                      echo "Backup response: $BACKUP_RESP"

                      echo "=== Sync and refresh completed successfully ==="
                  resources:
                    requests:
                      memory: "32Mi"
                      cpu: "25m"
                    limits:
                      memory: "64Mi"
                      cpu: "50m"
